<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/icons/paz-baires-logotipo-blanco-2.png" />
    <link rel="stylesheet" href="css/estilos-comunes.css" />
    <link rel="stylesheet" href="css/info-producto.css" />
    <title>Paz Baires</title>
  </head>
  <body>
    <main>
      <div class="product-container loading" id="productContainer">
        <div class="product-gallery">
          <div class="main-image-wrapper">
            <img
              src="images/icons/flecha-izq-lila.png"
              class="nav-arrow prev-arrow"
              id="prevBtn"
              alt="Anterior"
            />

            <div class="main-image">
              <img id="mainImg" src="" alt="Cargando..." />
            </div>

            <img
              src="images/icons/flecha-der-lila.png"
              class="nav-arrow next-arrow"
              id="nextBtn"
              alt="Siguiente"
            />
          </div>
          <div class="thumbnails" id="thumbBar"></div>

          <div class="product-description-container">
            <h3 class="desc-title">Sobre este producto</h3>
            <p id="productDesc" class="desc-content"></p>
          </div>
        </div>

        <div class="product-info-panel">
          <div class="product-header">
            <span id="productBrand" class="brand-tag">PAZ BAIRES</span>
            <h1 id="productName">Nombre del Producto</h1>
          </div>

          <div class="price-section">
            <span id="oldPrice" class="old-price"></span>
            <span id="currentPrice" class="current-price"></span>
            <div class="transfer-box">
              <strong id="transferPrice"></strong> con Transferencia (15% OFF)
            </div>
          </div>

          <div id="variantSelector" class="selector-section"></div>

          <div id="techDetails" class="details-grid"></div>

          <div class="quantity-selector">
            <p class="selector-label">Cantidad</p>
            <div class="quantity-controls">
              <button type="button" class="qty-btn" id="decreaseQty">−</button>
              <input
                type="number"
                id="itemQuantity"
                value="1"
                min="1"
                readonly
              />
              <button type="button" class="qty-btn" id="increaseQty">+</button>
            </div>
            <p
              id="guia-seleccion"
              style="
                font-size: 0.85rem;
                margin-top: 10px;
                color: #fff;
                font-weight: 300;
              "
            >
              Seleccioná un color y la cantidad.
            </p>
          </div>

          <button class="btn-add-cart" id="btn-agregar">
            Añadir al carrito
          </button>
        </div>
      </div>
    </main>
    <script src="js/componentes.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/info-producto.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
