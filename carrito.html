<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/icons/paz-baires-logotipo-blanco-2.png" />
    <link rel="stylesheet" href="css/estilos-comunes.css" />
    <link rel="stylesheet" href="css/carrito.css" />
    <title>Paz Baires</title>
  </head>
  <body>
    <main>
      <div class="carrito-wrapper">
        <section class="items-container">
          <table class="carrito-tabla">
            <thead>
              <tr>
                <th>PRODUCTO</th>
                <th>PRECIO</th>
                <th>CANTIDAD</th>
                <th>SUBTOTAL</th>
              </tr>
            </thead>
            <tbody id="carrito-body">
              <tr class="carrito-item">
                <td class="prod-detalles">
                  <img src="images/ejemplo-producto.jpg" alt="Producto" />
                  <div class="info-texto">
                    <h3>Nombre del Producto</h3>
                    <p class="variante-tag">Color: <span>Azul Francia</span></p>
                    <p class="stock-tag">En stock</p>
                  </div>
                </td>
                <td class="prod-precio">$ 5.800</td>
                <td class="prod-qty">
                  <div class="qty-selector">
                    <button>-</button>
                    <input type="number" value="1" readonly />
                    <button>+</button>
                  </div>
                </td>
                <td class="prod-subtotal"><strong>$ 5.800</strong></td>
                <td class="prod-remove">
                  <button class="btn-remove">×</button>
                </td>
              </tr>
            </tbody>
          </table>

          <a href="tienda.html" class="btn-seguir-comprando"
            >SEGUIR COMPRANDO</a
          >
        </section>

        <aside class="totales-container">
          <div class="totales-card">

            <div class="envio-section">
              <p>Seleccione método de envío</p>
              <div class="envio-options">
                <label class="option-card">
                  <input type="radio" name="envio" value="expreso" />
                  <div class="option-info">
                    <strong>Transporte o expreso</strong>
                    <span>Puedes elegir el transporte que prefieras.</span>
                  </div>
                </label>

                <label class="option-card">
                  <input type="radio" name="envio" value="moto" />
                  <div class="option-info">
                    <strong>Envío en moto</strong>
                    <span>Consulta el precio según la dirección.</span>
                  </div>
                </label>

                <label class="option-card">
                  <input type="radio" name="envio" value="local" />
                  <div class="option-info">
                    <strong>Retiro en el local</strong>
                    <span>Sin costo. Te esperamos en nuestra sucursal.</span>
                  </div>
                </label>
              </div>
            </div>

            <div class="pago-section">
              <p>Seleccione método de pago</p>
              <div class="pago-options">
                <label class="option-card">
                  <input
                    type="radio"
                    name="pago"
                    value="transferencia"
                  />
                  <div class="option-info">
                    <strong>Transferencia (MP)</strong>
                    <span>Te enviaremos el CVU/Alias</span>
                  </div>
                </label>
                <label class="option-card">
                  <input type="radio" name="pago" value="efectivo" />
                  <div class="option-info">
                    <strong>Efectivo</strong>
                    <span>Abonás al retirar tu pedido</span>
                  </div>
                </label>
              </div>
            </div>

            <div class="total-row">
              <span>TOTAL</span>
              <span class="total-price" id="total-general">$ 23.800</span>
            </div>

            <button class="btn-finalizar">FINALIZAR COMPRA</button>
          </div>
        </aside>
      </div>
    </main>
    <script src="js/componentes.js"></script>
    <script src="js/carrito.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
