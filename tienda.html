<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/icons/paz-baires-logotipo-blanco-2.png" />
    <link rel="stylesheet" href="css/estilos-comunes.css">
    <link rel="stylesheet" href="css/tienda.css" />
    <title>Paz Baires</title>
  </head>
  <body>
    <main class="tienda-main">
      <header class="tienda-header-sticky">
        <nav class="filtros-superiores">
          <button class="filter-btn active">Todos</button>
          <button class="filter-btn">Blanqueria</button>
          <button class="filter-btn">Accesorios</button>
          <button class="filter-btn">Pijamas</button>
        </nav>
      </header>

      <div class="contenedor-flexible">
        <div
          class="filtros-overlay"
          id="filtrosOverlay"
          onclick="toggleFiltros()"
        ></div>

        <button class="btn-flotante-filtros" onclick="toggleFiltros()">
          <span>Filtrar productos</span>
        </button>

        <aside class="sidebar-filtros" id="sidebarFiltros">
          <div class="sidebar-header-mobile">
            <h3>Filtros</h3>
            <button class="btn-cerrar-filtros" onclick="toggleFiltros()">
              ✕
            </button>
          </div>

          <div class="sidebar-footer-mobile">
            <button class="btn-aplicar-mobile" onclick="toggleFiltros()">
              Ver resultados
            </button>
          </div>

          <div class="grupo-filtro">
            <h4>Ambiente</h4>
            <ul class="lista-check">
              <li>
                <label
                  ><input type="checkbox" name="ambiente" value="baño" />
                  Baño</label
                >
              </li>
              <li>
                <label
                  ><input type="checkbox" name="ambiente" value="Dormitorio" />
                  Dormitorio</label
                >
              </li>
              <li>
                <label
                  ><input
                    type="checkbox"
                    name="ambiente"
                    value="Mesa y Cocina"
                  />
                  Mesa y Cocina</label
                >
              </li>
              <li>
                <label
                  ><input
                    type="checkbox"
                    name="ambiente"
                    value="Playa y Aire Libre"
                  />
                  Playa y Aire Libre</label
                >
              </li>
            </ul>
          </div>

          <div class="grupo-filtro">
            <h4>Público</h4>
            <ul class="lista-check">
              <li>
                <label
                  ><input type="checkbox" name="publico" value="adulto" />
                  Adultos</label
                >
              </li>
              <li>
                <label
                  ><input type="checkbox" name="publico" value="Infantil / Juvenil" />
                  Infantil / Juvenil</label
                >
              </li>
              <li>
                <label
                  ><input type="checkbox" name="oferta" value="si" />
                  <strong>🔥 OFERTAS</strong></label
                >
              </li>
            </ul>
          </div>

          <div class="grupo-filtro">
            <h4>Material</h4>
            <ul class="lista-check">
              <li>
                <label
                  ><input type="checkbox" name="material" value="Algodón" />
                  Algodón</label
                >
              </li>
              <li>
                <label
                  ><input type="checkbox" name="material" value="Satén" />
                  Satén</label
                >
              </li>
              <li>
                <label
                  ><input
                    type="checkbox"
                    name="material"
                    value="Secado Rápido"
                  />
                  Secado Rápido</label
                >
              </li>
              <li>
                <label>
                  <input type="checkbox" name="material" value="Microfibra" />
                  Microfibra
                </label>
              </li>
            </ul>
          </div>

          <div class="grupo-filtro">
            <h4>Precio Máximo</h4>
            <input
              type="range"
              id="rango-precio"
              min="2000"
              max="30000"
              step="500"
              value="30000"
              class="range-estilo"
            />
            <div class="rango-valores">
              <span id="precio-valor">$30.000</span>
            </div>
          </div>

          <button class="btn-limpiar" onclick="limpiarFiltros()">
            Limpiar filtros
          </button>
        </aside>

        <section class="grid-productos-fijo" id="contenedor-tienda"></section>
      </div>
    </main>
    <script src="js/componentes.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/main.js"></script>
    <script src="js/tienda.js"></script>
  </body>
</html>
